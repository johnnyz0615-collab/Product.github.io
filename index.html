<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <!-- 适配手机端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads and Video Tutorials</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h1 {
            color: #222;
            text-align: center;
            margin-bottom: 10px;
            font-size: 26px;
        }
        .desc {
            color: #666;
            text-align: center;
            margin-bottom: 35px;
            line-height: 1.6;
        }
        .link-box {
            margin: 20px 0;
        }
        .link-item {
            display: block;
            text-decoration: none;
            padding: 16px 20px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        .link-item:hover {
            background-color: #f0f7ff;
            border-color: #4080ff;
        }
        .link-title {
            font-size: 18px;
            color: #1967d2;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .link-tip {
            font-size: 14px;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Product Support Materials Center</h1>
        <p class="desc">Below you can find tutorial videos and digital manuals—just click to open.</p>

        <div class="link-box">
            <!-- 1. 教学视频链接 替换href双引号内为你的视频地址 -->
            <a class="link-item" href="https://youtu.be/GXGdgL92Kx8" target="_blank">
                <div class="link-title>📹 Complete tutorial video</div>
                <div class="link-tip">Click to open the video tutorial in a new window</div>
            </a>

            <!-- 2. 电子说明书链接 替换href为你的PDF/文档地址 -->
            <a class="link-item" href="https://drive.google.com/file/d/1PehJdQAE7SR31rDRomJIhSGfR3hHH19Z/view?usp=drive_link" target="_blank">
                <div class="link-title>📄 Official User Manual(PDF)</div>
                <div class="link-tip">Complete illustrated manual, can be downloaded and saved</div>
            </a>

            <!-- 可无限复制增加更多链接 -->
            <a class="link-item" href="https://www.amazon.com/dp/B0GWLN1GX7" target="_blank">
                <div class="link-title>💾 配套驱动安装包</div>
                <div class="link-tip">Product Amazon selling URL</div>
            </a>
        </div>
    </div>
</body>
</html>
