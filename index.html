<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配手机端 -->

    <style>
        * {

            font-family: "Microsoft Yahei", sans-serif;

            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);

        h1 {

            line-height: 1.6;
        }
        .link-box {
            margin: 20px 0;
        }
        .link-item {
            display: block;
            text-decoration: none;
            padding: 16px 20px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        .link-item:hover {
            background-color: #f0f7ff;
            border-color: #4080ff;
        }
        .link-title {
            font-size: 18px;
            color: #1967d2;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .link-tip {
            font-size: 14px;
            color: #777;
